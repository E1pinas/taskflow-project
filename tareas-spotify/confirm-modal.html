<div
  id="confirmOverlay"
  class="fixed inset-0 z-40 hidden items-center justify-center bg-black/60 p-4 flex"
>
  <div
    class="w-full max-w-[460px] rounded-xl bg-white p-5 shadow-xl dark:bg-slate-800"
  >
    <h2
      class="mb-2 text-lg font-semibold text-slate-900 dark:text-slate-100"
      data-confirm-title
    >
      Confirmar acción
    </h2>
    <p
      class="mb-3 text-sm text-slate-700 dark:text-slate-300"
      data-confirm-message
    ></p>
    <pre
      class="max-h-40 overflow-y-auto rounded-md bg-slate-100 p-2 text-xs text-slate-800 dark:bg-slate-900 dark:text-slate-200"
      data-confirm-detail
    ></pre>
    <div class="mt-4 flex justify-end gap-2">
      <button
        type="button"
        data-confirm-cancel
        class="rounded-lg bg-slate-500 px-3 py-1.5 text-sm font-medium text-white hover:bg-slate-600 dark:bg-slate-600 dark:hover:bg-slate-500"
      >
        Cancelar
      </button>
      <button
        type="button"
        data-confirm-accept
        class="rounded-lg bg-emerald-500 px-3 py-1.5 text-sm font-medium text-white hover:bg-emerald-600"
      >
        Confirmar
      </button>
    </div>
  </div>
</div>
