<div
  id="confirmOverlay"
  class="confirmacion-capa hidden"
>
  <div class="surface-card modal-panel modal-panel-md shadow-xl">
    <h2
      class="titulo-confirmacion"
      data-confirm-title
    >
      Confirmar acción
    </h2>
    <p
      class="mensaje-confirmacion"
      data-confirm-message
    ></p>
    <pre
      class="surface-card-strong ui-text-muted detalle-confirmacion"
      data-confirm-detail
    ></pre>
    <div class="acciones-confirmacion">
      <button
        type="button"
        data-confirm-cancel
        class="btn-secondary boton-tamano-sm"
      >
        Cancelar
      </button>
      <button
        type="button"
        data-confirm-accept
        class="btn-accent boton-tamano-sm"
      >
        Confirmar
      </button>
    </div>
  </div>
</div>
