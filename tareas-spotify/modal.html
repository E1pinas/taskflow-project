<div id="modal" class="modal hidden">
  <div class="modal-content">
    <h2>Agregar canción</h2>
    <form id="formTarea">
      <input
        type="text"
        id="artistaCancion"
        placeholder="Nombre del artista (opcional)"
      />
      <input
        type="text"
        id="nombreCancion"
        placeholder="Nombre de la canción"
        required
      />
      <input type="text" id="albumCancion" placeholder="Álbum (opcional)" />
      <input type="file" id="imagenCancion" accept="image/*" />
      <button type="submit">Guardar</button>
      <button type="button" id="cerrarModal">Cancelar</button>
    </form>
  </div>
</div>
