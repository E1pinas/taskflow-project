<div
  id="modal"
  class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 p-6 flex"
>
  <div class="w-full max-w-[480px] rounded-xl bg-white p-5 dark:bg-slate-800">
    <h2 class="mb-3 text-xl font-semibold text-slate-900 dark:text-slate-100">Agregar canción</h2>
    <form id="formTarea" class="grid gap-2">
      <input
        type="text"
        id="artistaCancion"
        placeholder="Nombre del artista (opcional)"
        class="w-full rounded-lg border border-slate-300 bg-white p-2.5 text-slate-900 placeholder:text-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100"
      />
      <input
        type="text"
        id="nombreCancion"
        placeholder="Nombre de la canción"
        required
        class="w-full rounded-lg border border-slate-300 bg-white p-2.5 text-slate-900 placeholder:text-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100"
      />
      <input
        type="text"
        id="albumCancion"
        placeholder="Álbum (opcional)"
        class="w-full rounded-lg border border-slate-300 bg-white p-2.5 text-slate-900 placeholder:text-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/40 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100"
      />
      <input
        type="file"
        id="imagenCancion"
        accept="image/*"
        class="w-full rounded-lg border border-slate-300 bg-white p-2.5 text-slate-700 file:mr-3 file:rounded-md file:border-0 file:bg-slate-100 file:px-3 file:py-1 file:text-sm file:font-medium file:text-slate-700 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-200 dark:file:bg-slate-700 dark:file:text-slate-100"
      />
      <button
        type="submit"
        class="mt-1 rounded-lg bg-emerald-500 px-3.5 py-2.5 font-medium text-white transition hover:bg-emerald-600"
      >
        Guardar
      </button>
      <button
        type="button"
        id="cerrarModal"
        class="rounded-lg bg-slate-500 px-3.5 py-2.5 font-medium text-white transition hover:bg-slate-600 dark:bg-slate-600 dark:hover:bg-slate-500"
      >
        Cancelar
      </button>
    </form>
  </div>
</div>
