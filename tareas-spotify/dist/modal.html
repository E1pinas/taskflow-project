<div
  id="modal"
  class="modal-capa hidden"
>
  <div class="surface-card modal-panel modal-panel-lg">
    <h2 class="titulo-modal">
      Agregar canción
    </h2>
    <form id="formTarea" class="grid gap-2" novalidate>
      <label
        for="artistaCancion"
        class="etiqueta-formulario"
        >Nombre del artista</label
      >
      <input
        type="text"
        id="artistaCancion"
        placeholder="Nombre del artista (opcional)"
        class="ui-input campo-formulario"
      />
      <label
        for="nombreCancion"
        class="etiqueta-formulario"
        >Nombre de la canción</label
      >
      <input
        type="text"
        id="nombreCancion"
        placeholder="Nombre de la canción"
        class="ui-input campo-formulario"
      />
      <label
        for="albumCancion"
        class="etiqueta-formulario"
        >Álbum</label
      >
      <input
        type="text"
        id="albumCancion"
        placeholder="Álbum (opcional)"
        class="ui-input campo-formulario"
      />
      <label
        for="dificultadCancion"
        class="etiqueta-formulario"
        >Dificultad</label
      >
      <select
        id="dificultadCancion"
        class="ui-input campo-formulario"
      >
        <option value="facil">Fácil</option>
        <option value="media" selected>Media</option>
        <option value="dificil">Difícil</option>
      </select>
      <label
        for="imagenCancion"
        class="etiqueta-formulario"
        >Imagen de portada</label
      >
      <input
        type="file"
        id="imagenCancion"
        accept="image/*"
        class="ui-input campo-archivo"
      />
      <button
        type="submit"
        class="btn-accent boton-tamano-md mt-1"
      >
        Guardar
      </button>
      <button
        type="button"
        id="cerrarModal"
        class="btn-secondary boton-tamano-md"
      >
        Cancelar
      </button>
    </form>
  </div>
</div>
