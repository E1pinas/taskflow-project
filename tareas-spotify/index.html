<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tareas Spotify</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body
    class="min-h-screen p-6 font-sans app-shell max-sm:p-4"
  >
    <div class="flex items-center justify-around gap-3 mb-5">
      <h1 class="text-2xl font-bold ui-title">Taskflow Spotify</h1>
      <button
        id="toggleTema"
        type="button"
        aria-label="Cambiar entre modo claro y oscuro"
        class="px-3 py-2 text-sm font-medium transition border rounded-lg btn-secondary"
      >
        Modo oscuro
      </button>
    </div>
    <main class="pagina-principal">
      <div class="columna-principal">
        <div class="bloque-acciones">
          <button
            id="abrirModal"
            type="button"
            aria-label="Abrir modal para agregar nueva tarea"
            class="btn-accent boton-ancho-movil boton-tamano-md"
          >
            Agregar canción
          </button>
          <button
            id="borrarSeleccionadas"
            type="button"
            aria-label="Entrar en modo selección para borrar múltiples tareas"
            class="btn-soft boton-ancho-movil boton-tamano-md"
          >
            Seleccionar tareas para borrar
          </button>
        </div>
        <div id="contenedorBusqueda" class="contenedor-busqueda">
          <input
            id="buscarTarea"
            type="search"
            placeholder="Buscar por artista, canción, álbum o dificultad..."
            aria-label="Buscar tarea"
            class="ui-input campo-busqueda"
          />
        </div>
        <div id="contenedorResumen" class="surface-card tarjeta-resumen">
          <p id="resumenVista" class="flex-1 min-w-[220px]" aria-live="polite">
            0 resultados
          </p>
          <span class="p-1 stat-pill">
            Pendientes:
            <strong id="contadorPendientesVista">0</strong>
          </span>
          <span class="p-1 stat-pill ">
            Completadas:
            <strong id="contadorCompletadasVista">0</strong>
          </span>
        </div>
        <!-- controles adicionales: filtro de estado, orden y export/import se agregarán dinámicamente -->
        <div id="controlesAvanzados" class="controles-avanzados">
          <div class="grupo-control">
            <fieldset id="filtroEstado" class="filtro-estado">
              <legend class="sr-only">Filtrar por estado</legend>
              <label class="text-sm ui-text-muted"
                ><input type="radio" name="estado" value="todos" checked />
                Todos</label
              >
              <label class="text-sm ui-text-muted"
                ><input type="radio" name="estado" value="pendientes" />
                Pendientes</label
              >
              <label class="text-sm ui-text-muted"
                ><input type="radio" name="estado" value="completadas" />
                Completadas</label
              >
            </fieldset>
          </div>
          <div class="grupo-control">
            <label for="filtrarDificultad" class="text-sm ui-text-muted">Dificultad:</label>
            <select
              id="filtrarDificultad"
              class="ui-input campo-select"
            >
              <option value="todas" selected>Todas</option>
              <option value="facil">Fácil</option>
              <option value="media">Media</option>
              <option value="dificil">Difícil</option>
            </select>
          </div>
        </div>

        <!-- Tareas Pendientes -->
        <section class="seccion-tareas">
          <div class="cabecera-seccion">
            <h2 class="titulo-seccion">
              Tareas Pendientes
            </h2>
            <button
              id="moverCompletadas"
              type="button"
              aria-label="Completar todas las tareas pendientes"
              class="btn-accent boton-tamano-sm"
            >
              Completar todas
            </button>
          </div>
          <ul
            id="listaTareasPendientes"
            class="list-frame"
          ></ul>
        </section>

        <!-- Tareas Completadas -->
        <section class="seccion-tareas">
          <div class="cabecera-seccion">
            <h2 class="titulo-seccion">
              Tareas Completadas
            </h2>
            <button
              id="moverPendientes"
              type="button"
              aria-label="Mover tareas seleccionadas a pendientes"
              class="btn-soft boton-tamano-sm"
            >
              Mover a pendientes
            </button>
          </div>
          <ul
            id="listaTareasCompletadas"
            class="list-frame"
          ></ul>
        </section>
      </div>

      <aside class="panel-lateral">
        <h2 class="titulo-seccion">
          Estadísticas
        </h2>
        <div class="surface-card panel-estadisticas">
          <p id="totalTareas" class="texto-estadistica">
            Total: 0
          </p>
          <p id="completadas" class="texto-estadistica">
            Completadas: 0
          </p>
          <p id="pendientes" class="texto-estadistica">
            Pendientes: 0
          </p>
          <p id="facil" class="texto-estadistica">
            Fácil: 0
          </p>
          <p id="media" class="texto-estadistica">
            Media: 0
          </p>
          <p id="dificil" class="texto-estadistica">
            Difícil: 0
          </p>
        </div>
      </aside>
    </main>

    <template id="taskTemplate">
      <li class="task-card tarjeta-tarea" data-role="task">
        <input
          type="checkbox"
          class="task-checkbox checkbox-tarea"
          data-action="toggle-tarea"
        />
        <img
          class="task-image imagen-tarea"
          src=""
          alt="Portada"
          style="display: none"
        />
        <div class="contenido-tarea">
          <strong class="task-cancion titulo-tarea"></strong>
          <span class="task-artista meta-tarea"></span>
          <span class="task-album meta-tarea"></span>
          <span class="task-dificultad meta-tarea"></span>
        </div>
        <button
          class="edit-btn btn-secondary boton-tamano-xs shrink-0"
          type="button"
          data-action="edit"
        >
          Editar
        </button>
        <button
          class="delete-btn btn-soft boton-tamano-xs shrink-0"
          type="button"
          data-action="delete"
        >
          Eliminar
        </button>
      </li>
    </template>

    <!-- Aquí se inyectará la modal principal -->
    <div id="modalContainer"></div>

    <!-- Aquí se inyectará la modal de confirmación genérica -->
    <div id="confirmContainer"></div>

    <!-- Contenedor para toasts -->
    <div
      id="toastContainer"
      class="fixed z-50 flex flex-col bottom-4 right-4"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    <script src="modal.js"></script>
    <script src="confirm-modal.js"></script>
    <script type="module" src="src/js/principal.js"></script>
  </body>
</html>
